limit_req_zone $binary_remote_addr zone=hive_ws:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=hive_conn:10m;

upstream hive_relay_backend {
    server 127.0.0.1:8765;
    keepalive 32;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name fogoeluar.com.br www.fogoeluar.com.br;

    # ── TLS 1.3 ONLY ────────────────────────────────────────────────────────
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Let's Encrypt (gerado pelo certbot via setup.sh)
    ssl_certificate     /etc/letsencrypt/live/fogoeluar.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fogoeluar.com.br/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/fogoeluar.com.br/chain.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (Let's Encrypt suporta)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── HEADERS DE SEGURANÇA ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Content-Security-Policy   "default-src 'none'" always;

    # ── ZERO LOGS ────────────────────────────────────────────────────────────
    access_log off;
    error_log  /var/log/nginx/hive-error.log warn;

    # Health check
    location = /health {
        proxy_pass         http://hive_relay_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
    }

    # Admin Center (HTTP Basic Auth)
    location /admin {
        alias /opt/hive-relay/admin;
        index index.html;
        auth_basic "Hive Admin";
        auth_basic_user_file /etc/nginx/.hive_admin_passwd;
        try_files $uri $uri/ /admin/index.html;
    }

    # WebSocket relay
    location /gun {
        limit_req  zone=hive_ws burst=40 nodelay;
        limit_conn hive_conn 30;

        proxy_pass         http://hive_relay_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;

        # Não propagar IP do cliente
        proxy_set_header X-Real-IP       "";
        proxy_set_header X-Forwarded-For "";

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
        client_max_body_size  2m;
    }

    # Bloquear tudo o mais
    location / {
        return 444;
    }
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fogoeluar.com.br www.fogoeluar.com.br;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://fogoeluar.com.br$request_uri; }
}
